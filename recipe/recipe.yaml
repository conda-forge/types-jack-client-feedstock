# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.5.10.20260518"

package:
  name: types-jack-client
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/types-jack-client/types_jack_client-${{ version }}.tar.gz
  sha256: a1825a00b60ddc9627e5bf2659a7766175d8d420f078f3f01addc7acc5bc7e9e

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=77.0.3
  run:
    - numpy
    - python >=${{ python_min }}
    - types-cffi

tests:
  - package_contents:
      site_packages:
        - jack-stubs/__init__.pyi
  - python:
      imports: []
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/python/typeshed
  summary: Typing stubs for JACK-Client
  license: Apache-2.0 AND MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - fhoehle
    - conda-forge/mypy
